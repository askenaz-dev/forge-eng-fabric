apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default .Chart.Name .Values.nameOverride }}
  labels:
    app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride }}
    forge.dev/revision-id: {{ .Values.revisionId | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ default .Chart.Name .Values.nameOverride }}
        forge.dev/revision-id: {{ .Values.revisionId | quote }}
    spec:
      serviceAccountName: forge-deployer
      containers:
        - name: app
          image: {{ printf "%s@%s" .Values.image.repository .Values.image.digest | quote }}
          ports:
            - containerPort: {{ .Values.service.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: {{ .Values.service.port }}
