<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" id="alfred-mark-working" role="img" aria-label="Alfred (working)">
  <defs>
    <linearGradient id="alfred-ember-grad-working" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A77E"/>
      <stop offset="60%" stop-color="#DC4318"/>
      <stop offset="100%" stop-color="#8A2509"/>
    </linearGradient>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        #alfred-working-ember { animation: alfredEmberPulse 2.4s ease-in-out infinite; transform-origin: 12px 12px; }
        #alfred-working-bowtie { animation: alfredBowtieSway 4.8s ease-in-out infinite; transform-origin: 12px 12px; }
      }
      @keyframes alfredEmberPulse {
        0%, 100% { transform: scale(0.96); opacity: 0.9; }
        50%      { transform: scale(1.06); opacity: 1.0; }
      }
      @keyframes alfredBowtieSway {
        0%, 100% { transform: rotate(0deg); }
        50%      { transform: rotate(2deg); }
      }
    </style>
  </defs>
  <g id="alfred-working-bowtie">
    <path d="M4 10 L12 13 L20 10 L20 14 L12 11 L4 14 Z" fill="#1A1614"/>
  </g>
  <circle id="alfred-working-ember" cx="12" cy="12" r="2.4" fill="url(#alfred-ember-grad-working)"/>
  <rect x="11.2" y="3.5" width="1.6" height="4.5" rx="0.6" fill="#1A1614"/>
  <rect x="11.2" y="3.5" width="3.2" height="1.4" rx="0.4" fill="#1A1614"/>
</svg>
