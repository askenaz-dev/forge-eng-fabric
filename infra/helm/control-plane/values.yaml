replicaCount: 1
image:
  repository: forge/control-plane
  tag: local
  pullPolicy: IfNotPresent
service:
  port: 8081
probes:
  enabled: true
  readinessPath: /readyz
  livenessPath: /healthz
env:
  ADDR: ":8081"
  POSTGRES_URL: "postgres://forge:forge@postgres:5432/forge_control_plane?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  KEYCLOAK_ISSUER: "http://keycloak:8080/realms/forge"
  KEYCLOAK_AUDIENCE: "forge-control-plane"
  OPENFGA_API_URL: "http://openfga:8080"
  KAFKA_BROKERS: "kafka:9092"
  EVENTS_TOPIC: "forge.events"
  OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
