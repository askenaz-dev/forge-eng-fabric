# Default values for the service-http flavor. Consumers MUST override `image.repository`
# and SHOULD override `service.port` and `env`.

replicaCount: 2

image:
  repository: forge/CHANGE-ME
  tag: local
  pullPolicy: IfNotPresent

service:
  port: 8080
  type: ClusterIP

probes:
  enabled: true
  readinessPath: /readyz
  livenessPath: /healthz

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  # ingressFrom is a list of label selectors permitted to reach this service.
  # Default: deny-all (only the Service object endpoints reachable cluster-internally).
  ingressFrom: []
  # egressTo: list of label-selector + ports the service is allowed to call.
  # Default: DNS + Postgres + Kafka + LiteLLM.
  egressTo:
    - ports:
        - { port: 53, protocol: UDP }
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    - ports:
        - { port: 5432, protocol: TCP }
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
    - ports:
        - { port: 9092, protocol: TCP }
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kafka

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s

serviceAccount:
  create: true
  annotations: {}
  # rbacRules: optional list of {apiGroups, resources, verbs}
  rbacRules: []

env: {}
