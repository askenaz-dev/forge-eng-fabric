{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/part-of: forge
    spec:
      containers:
        - name: litellm
          image: {{ .Values.litellm.image | quote }}
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - { name: http, containerPort: 4000 }
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellm.masterKeySecretName }}
                  key: master-key
          volumeMounts:
            - { name: config, mountPath: /app/config.yaml, subPath: config.yaml, readOnly: true }
      volumes:
        - name: config
          configMap:
            name: litellm-config
{{- end }}
