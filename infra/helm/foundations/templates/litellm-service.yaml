{{- if .Values.litellm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: forge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: litellm
  ports:
    - { name: http, port: 4000, targetPort: http }
{{- end }}
