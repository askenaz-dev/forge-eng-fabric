apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: forge-platform-secrets
  namespace: forge-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: forge-platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef: { key: forge-postgres-password }
    - secretKey: redis-password
      remoteRef: { key: forge-redis-password }
    - secretKey: keycloak-admin-password
      remoteRef: { key: forge-keycloak-admin-password }
    - secretKey: litellm-master-key
      remoteRef: { key: forge-litellm-master-key }
    - secretKey: github-app-private-key
      remoteRef: { key: forge-github-app-private-key }
    - secretKey: github-webhook-secret
      remoteRef: { key: forge-github-webhook-secret }
