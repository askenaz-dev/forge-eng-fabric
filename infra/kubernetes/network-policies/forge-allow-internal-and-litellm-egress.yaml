apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-allow-internal-and-litellm-egress
  namespace: forge-system
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: NotIn
        values: [litellm]
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forge-system
      ports:
        - { protocol: TCP, port: 4000 }
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 8081 }
        - { protocol: TCP, port: 8082 }
        - { protocol: TCP, port: 8083 }
        - { protocol: TCP, port: 8090 }
        - { protocol: TCP, port: 9092 }
        - { protocol: TCP, port: 5432 }
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 4317 }
        - { protocol: TCP, port: 4318 }
        - { protocol: TCP, port: 19530 }
