name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    name: go services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/control-plane
          - services/registry
          - services/audit
          - services/scaffolder
          - services/app-onboarding
          - services/policy-engine
          - services/sdlc-orchestrator
          - services/sdlc-iac
          - services/healing-engine
          - pkg/artifact-store-adapter
          - pkg/workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test ./...

  python:
    name: python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Alfred stub
        run: python -m compileall services/alfred
      - name: Compile sdlc-architecture-skills
        run: python -m compileall services/sdlc-architecture-skills
      - name: Compile sdlc-design-skills
        run: python -m compileall services/sdlc-design-skills
      - name: Compile sdlc-qa-skills
        run: python -m compileall services/sdlc-qa-skills

  node:
    name: portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: "9"
      - name: Install dependencies
        working-directory: portal
        run: pnpm install
      - name: Build portal
        working-directory: portal
        run: pnpm build
      - name: Install Playwright browsers
        working-directory: portal
        run: pnpm exec playwright install --with-deps chromium
      - name: Run portal E2E
        working-directory: portal
        run: pnpm test:e2e

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate OpenAPI contracts
        run: npx -y @redocly/cli lint contracts/openapi/control-plane.yaml contracts/openapi/registry.yaml
      - name: Generate OpenAPI clients
        run: bash contracts/openapi/codegen.sh
      - name: Validate JSON contracts
        shell: bash
        run: |
          python -m json.tool contracts/openfga/authorization-model.json >/dev/null
          for f in contracts/events/*.json; do python -m json.tool "$f" >/dev/null; done
      - name: Check OpenSpec change status
        run: npx -y @fission-ai/openspec status --change phase-0-foundations --json

  reference-flow-smoke:
    name: reference flow smoke
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run intent-to-deploy smoke test
        run: python scripts/integration/smoke_intent_to_deploy.py
        env:
          # CI runs against ephemeral infrastructure when available; the script
          # falls back to synthetic mode that still validates milestone ordering.
          WORKSPACE_ID: ci-workspace
          RUNTIME_ID: rt-ci-1

  intent-to-infrastructure-smoke:
    name: intent-to-infrastructure smoke (sdlc-end-to-end)
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run intent-to-infrastructure smoke test
        run: python scripts/integration/smoke_intent_to_infrastructure.py
        env:
          # Synthetic mode: validates milestone ordering without a live stack.
          # Set LIVE_STACK=true + service URLs to test against a real cluster.
          SYNTHETIC_MODE: "true"
          CORRELATION_ID: "ci-${{ github.run_id }}"
