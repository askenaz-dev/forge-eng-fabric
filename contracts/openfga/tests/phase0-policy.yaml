name: phase0-policy
model_file: ../authorization-model.json
tuples:
  - user: tenant:acme
    relation: tenant
    object: business_unit:platform
  - user: business_unit:platform
    relation: business_unit
    object: workspace:workspace-a
  - user: business_unit:platform
    relation: business_unit
    object: workspace:workspace-b
  - user: user:alice
    relation: owner
    object: workspace:workspace-a
  - user: workspace:workspace-a
    relation: workspace
    object: asset:asset-a
  - user: workspace:workspace-a
    relation: workspace
    object: repo:repo-a
  - user: workspace:workspace-a
    relation: workspace
    object: environment:dev
  - user: environment:dev
    relation: environment
    object: deployment:deployment-a
  - user: tenant:acme
    relation: tenant
    object: external_developer:dev-bob@acme
  - user: user:bob
    relation: assignable_developer
    object: workspace:workspace-a
  - user: tenant:acme
    relation: tenant
    object: gateway_caller:acme-mcp-gateway
  - user: tenant:acme
    relation: tenant
    object: gateway_caller:acme-a2a-gateway
  - user: tenant:acme
    relation: tenant
    object: external_partner:vendor-x
  # App entity tuples (Phase 5 app-first-class-entity)
  - user: workspace:workspace-a
    relation: parent
    object: app:app-a
  - user: user:alice
    relation: owner
    object: app:app-a
  - user: workspace:workspace-a
    relation: parent
    object: app:app-unassigned
  # App with no workspace tuple, only a direct editor override (e.g. contractor)
  - user: user:carol
    relation: editor
    object: app:app-override
tests:
  - name: workspace owners can view their own workspace
    check:
      - user: user:alice
        object: workspace:workspace-a
        assertions:
          can_view: true
          can_edit: true
  - name: workspace owners do not cross workspace boundaries
    check:
      - user: user:alice
        object: workspace:workspace-b
        assertions:
          can_view: false
          can_edit: false
  - name: workspace relations flow to assets repos environments and deployments
    check:
      - user: user:alice
        object: asset:asset-a
        assertions:
          can_view: true
          can_edit: true
      - user: user:alice
        object: repo:repo-a
        assertions:
          can_view: true
          can_edit: true
      - user: user:alice
        object: environment:dev
        assertions:
          can_view: true
          can_deploy: true
      - user: user:alice
        object: deployment:deployment-a
        assertions:
          can_view: true
  - name: external developer can be assigned to a workspace
    check:
      - user: user:bob
        object: workspace:workspace-a
        assertions:
          assignable_developer: true
          can_view: false
          can_edit: false
  - name: external developer cannot reach a non-assigned workspace
    check:
      - user: user:bob
        object: workspace:workspace-b
        assertions:
          assignable_developer: false
  - name: workspace editors and owners can launch agent-mode sessions
    check:
      - user: user:alice
        object: workspace:workspace-a
        assertions:
          can_alfred_agent_mode_run: true
          can_alfred_agent_mode_cancel: true
  - name: cross-workspace boundaries hold for alfred agent-mode
    check:
      - user: user:alice
        object: workspace:workspace-b
        assertions:
          can_alfred_agent_mode_run: false
          can_alfred_agent_mode_cancel: false
  - name: gateway callers are bound to their tenant
    check:
      - user: tenant:acme
        object: gateway_caller:acme-mcp-gateway
        assertions:
          tenant: true
      - user: tenant:acme
        object: gateway_caller:acme-a2a-gateway
        assertions:
          tenant: true
  - name: gateway callers do not cross tenant boundaries
    check:
      - user: tenant:other
        object: gateway_caller:acme-mcp-gateway
        assertions:
          tenant: false
      - user: tenant:other
        object: gateway_caller:acme-a2a-gateway
        assertions:
          tenant: false
  - name: external partners are bound to their tenant
    check:
      - user: tenant:acme
        object: external_partner:vendor-x
        assertions:
          tenant: true
  - name: external partners do not cross tenant boundaries
    check:
      - user: tenant:other
        object: external_partner:vendor-x
        assertions:
          tenant: false
  - name: workspace viewer inherits app viewer through parent relation
    check:
      - user: user:alice
        object: app:app-a
        assertions:
          can_view: true
          can_edit: true
          can_admin: true
  - name: app owner can edit and view their app
    check:
      - user: user:alice
        object: app:app-a
        assertions:
          can_view: true
          can_edit: true
          can_admin: true
  - name: explicit app editor override grants edit without workspace access
    check:
      - user: user:carol
        object: app:app-override
        assertions:
          can_view: true
          can_edit: true
          can_admin: false
      - user: user:carol
        object: workspace:workspace-a
        assertions:
          can_view: false
          can_edit: false
  - name: external developers cannot reach apps in unrelated workspaces
    check:
      - user: user:bob
        object: app:app-a
        assertions:
          can_view: false
          can_edit: false
