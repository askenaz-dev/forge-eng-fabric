openapi: 3.1.0
info:
  title: Forge Asset Registry API
  version: 0.1.0
  description: |
    Phase 0 minimal asset registry. Stores AI assets (MCP servers, skills, agents,
    workflows and prompt templates).
    In Phase 0 every asset is created with lifecycle_state=proposed only.
servers:
  - url: http://localhost:8082
    description: Local docker-compose
security:
  - bearerAuth: []
paths:
  /healthz: { get: { summary: Liveness, security: [], responses: { "200": { description: ok } } } }
  /readyz:  { get: { summary: Readiness, security: [], responses: { "200": { description: ready } } } }

  /v1/workspaces/{workspaceId}/assets:
    parameters:
      - { name: workspaceId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: List assets in a workspace
      parameters:
        - { name: type, in: query, schema: { $ref: "#/components/schemas/AssetType" } }
        - { name: owner_team, in: query, schema: { type: string } }
        - { name: visibility, in: query, schema: { $ref: "#/components/schemas/Visibility" } }
        - { name: lifecycle_state, in: query, schema: { $ref: "#/components/schemas/LifecycleState" } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Asset" }
    post:
      summary: Register a new asset (always lifecycle_state=proposed in Phase 0)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }

  /v1/assets/{assetId}:
    parameters:
      - { name: assetId, in: path, required: true, schema: { type: string } }
    get:
      summary: Get an asset (latest version)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "404": { description: not found }

  /v1/assets/{assetId}/versions/{version}:
    parameters:
      - { name: assetId, in: path, required: true, schema: { type: string } }
      - { name: version, in: path, required: true, schema: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$" } }
    get:
      summary: Get a specific version of an asset (immutable)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "404": { description: not found }

  /v1/assets/{assetId}/versions/{version}/lifecycle-hooks/gateway-publish:
    parameters:
      - { name: assetId, in: path, required: true, schema: { type: string } }
      - { name: version, in: path, required: true, schema: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$" } }
    post:
      summary: Publish an approved asset to the developer skill gateway
      description: |
        Atomically registers the packaged bundle (for skill/agent) or remote-transport
        contract (for mcp), flips `distribution.gateway_published=true`, and emits
        `com.forge.asset.gateway_published.v1`. The asset must be `approved` and
        `trust_level >= T1`. Auto-unpublish on lifecycle transition to deprecated/retired
        is handled by the transition endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GatewayPublishRequest" }
      responses:
        "200":
          description: published
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { description: invalid input (signature_invalid, not_packageable, invalid_channel) }
        "403": { description: forbidden }
        "404": { description: asset not found }
        "409": { description: distribution invariant violated or remote_transport required }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    AssetType:
      type: string
      enum: [mcp, skill, agent, workflow, prompt_template]
    Visibility:
      type: string
      enum: [workspace, tenant]
    LifecycleState:
      type: string
      enum: [proposed]
      description: Phase 0 only supports `proposed`. Phase 1 introduces T0–T5 transitions.
    Asset:
      type: object
      required: [id, version, type, name, owner_team, inputs_schema, outputs_schema, workspace_id, tenant_id, visibility, lifecycle_state, created_at]
      properties:
        id: { type: string }
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$" }
        type: { $ref: "#/components/schemas/AssetType" }
        name: { type: string }
        description: { type: string }
        owner_team: { type: string }
        inputs_schema:
          type: object
          additionalProperties: true
        outputs_schema:
          type: object
          additionalProperties: true
        workspace_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        visibility: { $ref: "#/components/schemas/Visibility" }
        lifecycle_state: { $ref: "#/components/schemas/LifecycleState" }
        owners:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }
        created_by: { type: string }
        distribution: { $ref: "#/components/schemas/Distribution" }
    Distribution:
      type: object
      required: [gateway_published, gateway_channel]
      properties:
        gateway_published: { type: boolean, default: false }
        gateway_channel:
          type: string
          enum: [stable, beta]
          default: stable
        package_digest: { type: string, nullable: true, description: "sha256 of the packaged Agent Skills bundle (skill/agent only)" }
        package_signed_at: { type: string, format: date-time, nullable: true }
        deprecation_pointer: { type: string, nullable: true, description: "asset_id@version pointing to the recommended replacement" }
    GatewayPublishRequest:
      type: object
      required: [channel]
      properties:
        channel: { type: string, enum: [stable, beta], default: stable }
        package_digest:
          type: string
          description: "sha256 of the bundle (required for skill/agent)"
        signature_id:
          type: string
          description: "cosign signature reference (required for skill/agent)"
        attestation_id:
          type: string
          description: "in-toto attestation reference (required for skill/agent)"
        bytes_uri:
          type: string
          description: "S3-compatible URI where the packaged bundle is stored (required for skill/agent)"
        size_bytes:
          type: integer
          format: int64
          minimum: 0
        remote_transport:
          type: object
          description: "remote transport contract (required for mcp)"
          additionalProperties: true
    AssetCreate:
      type: object
      required: [type, name, version, owner_team, inputs_schema, outputs_schema]
      properties:
        type: { $ref: "#/components/schemas/AssetType" }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$" }
        owner_team: { type: string, minLength: 1 }
        inputs_schema:
          type: object
          additionalProperties: true
        outputs_schema:
          type: object
          additionalProperties: true
        visibility: { $ref: "#/components/schemas/Visibility" }
        lifecycle_state: { $ref: "#/components/schemas/LifecycleState" }
        owners:
          type: array
          items: { type: string }
        metadata:
          type: object
          additionalProperties: true
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        correlation_id: { type: string }
