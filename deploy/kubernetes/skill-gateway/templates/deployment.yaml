apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skill-gateway.fullname" . }}
  labels: {{- include "skill-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "skill-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "skill-gateway.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8120
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if .Values.externalSecret.enabled }}
          envFrom:
            - secretRef:
                name: {{ .Values.externalSecret.name }}
          {{- end }}
          livenessProbe:  {{- toYaml .Values.probes.liveness  | nindent 12 }}
          readinessProbe: {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
