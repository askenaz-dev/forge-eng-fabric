receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

connectors:
  servicegraph:
    dimensions:
      - service.name
      - forge.tenant_id
      - forge.workspace_id

processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
  attributes/loki:
    actions:
      - action: insert
        key: loki.resource.labels
        value: service.name,deployment.environment,forge.tenant_id,forge.workspace_id,forge.correlation_id

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
  debug:
    verbosity: basic

service:
  telemetry:
    logs: { level: info }
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, servicegraph, debug]
    metrics:
      receivers: [otlp, servicegraph]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes/loki, batch]
      exporters: [otlphttp/loki, debug]
