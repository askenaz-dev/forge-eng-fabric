global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: control-plane
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: registry
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: audit
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: app-onboarding
    static_configs:
      - targets: ["host.docker.internal:8085"]

  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  - job_name: workflow-runtime
    static_configs:
      - targets: ["host.docker.internal:8093"]

  - job_name: workflow-registry
    static_configs:
      - targets: ["host.docker.internal:8094"]

  - job_name: marketplace
    static_configs:
      - targets: ["host.docker.internal:8095"]

  - job_name: asset-observability
    static_configs:
      - targets: ["host.docker.internal:8096"]

  - job_name: eval-harness-adv
    static_configs:
      - targets: ["host.docker.internal:8097"]

  - job_name: incident-detection
    static_configs:
      - targets: ["host.docker.internal:8101"]

  - job_name: healing-engine
    static_configs:
      - targets: ["host.docker.internal:8102"]

  - job_name: evolution
    static_configs:
      - targets: ["host.docker.internal:8103"]

  - job_name: diagnosis
    static_configs:
      - targets: ["host.docker.internal:8104"]

  - job_name: incidents-kb
    static_configs:
      - targets: ["host.docker.internal:8105"]

  - job_name: postmortem
    static_configs:
      - targets: ["host.docker.internal:8106"]

  - job_name: finops-advisor
    static_configs:
      - targets: ["host.docker.internal:8107"]

  - job_name: symptom-emitter-logs
    static_configs:
      - targets: ["symptom-emitter-logs:9090"]

  - job_name: symptom-emitter-probe
    static_configs:
      - targets: ["symptom-emitter-probe:9090"]

  - job_name: symptom-triager
    static_configs:
      - targets: ["symptom-triager:9090"]

  - job_name: symptom-emitter-webhook
    static_configs:
      - targets: ["symptom-emitter-webhook:9095"]

  - job_name: symptom-emitter-metrics
    static_configs:
      - targets: ["symptom-emitter-metrics:9090"]

  - job_name: symptom-emitter-ci
    static_configs:
      - targets: ["symptom-emitter-ci:9092"]

  - job_name: platform-ops
    static_configs:
      - targets: ["host.docker.internal:8130"]
